services:
  postgres:
    image: ankane/pgvector:latest
    environment:
      POSTGRES_USER: gitnexus
      POSTGRES_PASSWORD: gitnexus_secret
      POSTGRES_DB: gitnexus
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  neo4j:
    image: neo4j:5-community
    environment:
      NEO4J_AUTH: neo4j/gitnexus_graph
    ports:
      - "127.0.0.1:7474:7474"
      - "127.0.0.1:7687:7687"
    volumes:
      - neo4j_data:/data

  api:
    build: ./backend
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      - DATABASE_URL=postgresql://gitnexus:gitnexus_secret@postgres:5432/gitnexus
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=gitnexus_graph

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker

  frontend:
    build: ./frontend
    ports:
      - "127.0.0.1:3000:80"

volumes:
  postgres_data:
  neo4j_data:
